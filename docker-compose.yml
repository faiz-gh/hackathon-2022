version: '3'
services:
  www:
    image: php:apache
    volumes:
      - "./:/var/www/html"
    ports:
      - 80:80
      - 443:443 # for future ssl traffic
  db:
    image: mysql:latest
    environment:
      - MYSQL_DATABASE = hackathon
      - MYSQL_USER = admin
      - MYSQL_PASSWORD = admin@123
      - MYSQL_ALLOW_EMPTY_PASSWORD = 1
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - 8001:80
    environment:
      - PMA_HOST = db
      - PMA_PORT = 3306
      
